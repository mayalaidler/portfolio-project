<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Maya Laidler — Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon" />
    <title>{{ title }}</title>
</head>
<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/" class="nav-brand">ML</a>
            <nav>
                {% if request.path == '/' %}
                    <a href="#about"      class="nav-link">About</a>
                    <a href="#skills"     class="nav-link">Skills</a>
                    <a href="#experience" class="nav-link">Experience</a>
                    <a href="#education"  class="nav-link">Education</a>
                    <a href="#travel"     class="nav-link">Travel</a>
                {% else %}
                    <a href="/"           class="nav-link">Home</a>
                {% endif %}
                <a href="/hobbies" class="nav-link {% if request.path == '/hobbies' %}active{% endif %}">Hobbies</a>
                <a href="/timeline" class="nav-link {% if request.path == '/timeline' %}active{% endif %}">Timeline</a>
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
        <p>Designed &amp; built by Maya Laidler &nbsp;·&nbsp; 2026</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/gravatar.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
