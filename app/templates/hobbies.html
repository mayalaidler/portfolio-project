{% extends "base.html" %}

{% block content %}
<div class="page-hero">
    <h1>My Hobbies</h1>
    <p>Life outside the lab and the laptop</p>
</div>
<svg class="page-wave" viewBox="0 0 1440 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,25 C360,50 1080,0 1440,25 L1440,50 L0,50 Z" fill="#f4f4f8"/>
</svg>

<section class="section" id="hobbies">
    <div class="section-inner">
        <p class="section-title">What I Love</p>
        <h2 class="section-heading">Hobbies &amp; Interests</h2>
        <div class="hobbies-grid">
            {% for hobby in hobbies %}
            <div class="hobby-card">
                <div class="hobby-img-wrap">
                    <img src="{{ hobby.image }}" alt="{{ hobby.name }}"
                        onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=700&q=80'">
                </div>
                <div class="hobby-info">
                    <h3>{{ hobby.name }}</h3>
                    <p>{{ hobby.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
